name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Fabric Loom project cache
        uses: actions/cache@v4
        with:
          path: .gradle/loom-cache
          key: loom-cache-${{ runner.os }}-${{ hashFiles('gradle.properties') }}
          restore-keys: |
            loom-cache-${{ runner.os }}-

      - name: Make ./gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew :build