name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Fabric Loom project cache
        uses: actions/cache@v4
        with:
          path: .gradle/loom-cache
          key: loom-cache-${{ runner.os }}-${{ hashFiles('gradle.properties') }}
          restore-keys: |
            loom-cache-${{ runner.os }}-

      - name: Make ./gradlew executable
        run: chmod +x ./gradlew

      - name: Check license headers
        run: ./gradlew :common:checkLicenses :backend:checkLicenses :26.2-fabric:checkLicenses :26.2-neoforge:checkLicenses

      - name: Build
        run: ./gradlew :common:build :backend:build :26.2-fabric:build :26.2-neoforge:build

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: strand-fabric-26.2
          path: versions/26.2-fabric/build/libs/*.jar
          if-no-files-found: error

      - name: Upload NeoForge jar
        uses: actions/upload-artifact@v4
        with:
          name: strand-neoforge-26.2
          path: versions/26.2-neoforge/build/libs/*.jar
          if-no-files-found: error
